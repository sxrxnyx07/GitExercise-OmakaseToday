{% extends "base.html" %}

{% block title %}Manage Recipes{% endblock %}

{% block content %}

<div class="admin-recipes-wrapper">
    <h1 class="admin-title">Manage Recipes</h1>

    <div class="admin-controls">
        <input type="text" id="recipeSearch" class="search-input" 
            placeholder="Search recipe name...">

        <button onclick="filterRecipes()" class="search-btn">
            Search
        </button>

        <button type="button" onclick="addNewRow()" class="add-recipe-btn">
            + Add New Recipe
        </button>
    </div>

    <table class="recipes-table">
        <thead>
            <tr>
                <th>ACTION</th> 
                <th>ID</th>
                <th>NAME</th>
                <th>IMAGE</th>
                <th>RATING</th>
                <th>CLEAN_INGREDIENTS</th>
                <th>FULL_INGREDIENTS</th>
                <th>DIRECTIONS</th>
                <th>TIMING</th>
                <th>MEAL_CATEGORY</th>
                <th>FLAVOR_TYPE</th>
            </tr>
        </thead>

        <tbody id="recipeBody">
            {% for r in recipes %}
            <tr>
                <td>
                    <form action="/admin/recipes/update/{{ r.id }}" method="POST" enctype="multipart/form-data">
                        <button type="submit" class="update-btn">Save</button>
                        <a href="/admin/recipes/delete/{{ r.id }}" 
                           class="delete-btn" 
                           onclick="return confirm('Delete?')">Delete</a>
                </td>

                <td><input type="text" name="id" value="{{ r.id }}"></td>
                <td><input type="text" name="name" value="{{ r.name }}"></td>

                <td>
                    <label>
                        <img src="{{ r.image }}" class="recipe-img">
                        <input type="file" name="image_file" hidden>
                    </label>
                </td>

                <td><input type="text" name="rating" value="{{ r.rating }}"></td>
                <td><input type="text" name="clean_ingredients" value="{{ r.clean_ingredients }}"></td>
                <td><input type="text" name="full_ingredients" value="{{ r.full_ingredients }}"></td>
                <td><input type="text" name="directions" value="{{ r.directions }}"></td>
                <td><input type="text" name="timing" value="{{ r.timing }}"></td>
                <td><input type="text" name="meal_category" value="{{ r.meal_category }}"></td>
                <td><input type="text" name="flavor_type" value="{{ r.flavor_type }}"></td>

                    </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
