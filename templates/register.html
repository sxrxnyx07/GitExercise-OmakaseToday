<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SIGNUP</title>
        <link rel="icon" href="{{ url_for('static', filename='egg.ico') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>

    </head>
    <body data-page="register">
        <div class="page-container">
            <div class="book-section">
                <div class="book">       
                    <div class="spread" id="s1">
                        <div class="page-left">
                            <img src="{{ url_for('static', filename='css/picture/food1.jpg') }}">
                        </div>
                        <div class="page-right">
                            <img src="{{ url_for('static', filename='css/picture/food2.jpg') }}">
                        </div>
                    </div>
                    <div class="spread" id="s2">
                        <div class="page-left">
                            <img src="{{ url_for('static', filename='css/picture/food3.jpg') }}">
                        </div>
                        <div class="page-right">
                            <img src="{{ url_for('static', filename='css/picture/food4.jpg') }}">                           
                        </div>                
                    </div>
                    <div class="spread" id="s3">
                        <div class="page-left">
                            <img src="{{ url_for('static', filename='css/picture/food5.jpg') }}">
                        </div>
                        <div class="page-right">
                            <img src="{{ url_for('static', filename='css/picture/food6.jpg') }}">
                            <!-- FINAL BUTTON -->
                            <button class="access-btn" onclick="goLogin()">
                                Access Recipe
                            </button>
                        </div>                
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn" onclick="prevPage()">❮</button>
                        <button class="nav-btn" onclick="nextPage()">❯</button>
                    </div>
                </div>
            </div>
            <div class="auth-wrapper">
                <h1>SIGNUP NOW!</h1>
                <p id="error-message"></p>
                <form id="form" class="auth-form" method="POST">
                    <div>
                        <label for="username-input">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#EA3323"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Zm80-80h480v-32q0-11-5.5-20T700-306q-54-27-109-40.5T480-360q-56 0-111 13.5T260-306q-9 5-14.5 14t-5.5 20v32Zm296.5-343.5Q560-607 560-640t-23.5-56.5Q513-720 480-720t-56.5 23.5Q400-673 400-640t23.5 56.5Q447-560 480-560t56.5-23.5ZM480-640Zm0 400Z"/></svg>
                        </label>
                        <input type="text" name="username" id="username-input" placeholder="Enter your username">
                    </div>
                    <div>
                        <label for="email-input">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#EA3323"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280L160-640v400h640v-400L480-440Zm0-80 320-200H160l320 200ZM160-640v-80 480-400Z"/></svg>
                        </label>
                        <input type="email" name="email" id="email-input" placeholder="Enter your email">
                    </div>
                    <div>
                        <label for="password-input">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#EA3323"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm296.5-143.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>
                        </label>
                        <input type="password" name="password" id="password-input" placeholder="Enter your password">
                    </div>
                    <div>
                        <label for="repeat-password-input">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#EA3323"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm296.5-143.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z"/></svg>
                        </label>
                        <input type="password" name="repeat-password" id="repeat-password-input" placeholder="Repeat your password">
                    </div>
                    <button type="submit">SIGNUP</button>
                </form>
                <p>Already have an Account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </body>
</html>
