<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gacha Recipe System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">
    <a href="/breakfast">Breakfast</a>
    <a href="/lunch">Lunch</a>
    <a href="/dinner">Dinner</a>
    <a href="/dessert" class="active">Dessert</a>
    <a href="/drinks">Drinks</a>
</div>

<div class="container">

<h1 class="category-title">🍰 Dessert 🍩</h1>

<p class="subtitle">
    Feeling a little stressed lately?
    Add some sweetness to your day and brighten your mood 💖
</p>

    <!-- GACHA IMAGE -->
    <img id="gachaImg" class="gacha-img fade-in"
     src="{{ url_for('static', filename='gacha.png') }}">

    <div id="ball" class="ball"></div>

    <div class="machine-box">

        <div id="result">
            Click spin to get your recipe 🍽️
        </div>

        <button onclick="spin()">SPIN 🎲</button>

    </div>

</div>

<script>
function spin() {

    let resultBox = document.getElementById("result");
    let button = document.querySelector("button");
    let gachaImg = document.getElementById("gachaImg");
    let ball = document.getElementById("ball"); 

    button.disabled = true;

    gachaImg.classList.add("spin");
    resultBox.innerText = "Spinning...";

    setTimeout(() => {

        ball.classList.add("drop"); // ⭐ ball drop

        fetch('/random')
        .then(res => res.json())
        .then(data => {

            resultBox.innerText = "Revealing...";

            setTimeout(() => {

                resultBox.innerText = "You got: " + data.recipe;

                gachaImg.classList.remove("spin");
                ball.classList.remove("drop"); // reset

                button.disabled = false;

            }, 800);

        });

    }, 1000);
}
</script>

</body>
</html>
