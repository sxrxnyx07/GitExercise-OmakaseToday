<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gacha Recipe System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">
    <a href="/breakfast">Breakfast</a>
    <a href="/lunch">Lunch</a>
    <a href="/dinner">Dinner</a>
    <a href="/dessert" class="active">Dessert</a>
    <a href="/drinks">Drinks</a>
</div>

<div class="container">

<h1 class="category-title">🍰 Dessert 🍩</h1>

<p class="subtitle">
    Feeling a little stressed lately?
    Add some sweetness to your day and brighten your mood 💖
</p>

<div class="machine-wrapper">

    <img id="gachaImg" class="gacha-img fade-in"
         src="{{ url_for('static', filename='gacha1.png') }}">   <!-- GACHA IMAGE -->

    <div class="balls-inside" id="ballsInside"></div>

</div>

    <div id="ball" class="ball red"></div>

    <div class="machine-box">

    <div id="warningMsg" class="warning-msg"></div>

        <div id="result">
            Click spin to get your recipe 🍽️
        </div>

        <div id="resultHint" class="result-hint">
            Want more? Try spin again~
        </div>

        <button onclick="spin()">SPIN 🎲</button>

    </div>

<div class="recipe-container">
    {% for r in recipes %}
        <div class="recipe-card">

            <img src="{{ r['image'] }}" alt="{{ r['name'] }}">

            <h3 class="recipe-title">
                <a href="/recipe/{{ r['id'] }}">
                    {{ r['name'] }}
                </a>
            </h3>

        </div>
    {% endfor %}
</div>

</div>

<script>

    let isSpinning = false;
    
    let balls = document.querySelectorAll(".mini-ball");

window.onload = function () {

    const wrapper = document.getElementById("ballsInside");

    let colors = ["red","yellow","green","blue","purple"];

    // coordinate for balls
    let positions = [
        [-40, -40],
        [0, -60],
        [-20, 10],
        [-50, -10],
        [58, -47],
        [-85, -15],
        [-67, 13],
        [-16, -20],
        [10, 0],
        [55, -10],
        [37, 17],
        [-40, 30],
        [0, 35],
        [20, -30],
        [35, -80],
        [-75, -50],
        [-45, -75]
    ];

    positions.forEach(pos => {

        let ball = document.createElement("div");
        ball.classList.add("mini-ball");

        let color = colors[Math.floor(Math.random() * colors.length)];
        ball.classList.add(color);

        ball.style.setProperty('--x', pos[0] + 'px');
        ball.style.setProperty('--y', pos[1] + 'px');

        wrapper.appendChild(ball);
    });
    setTimeout(() => {
        wrapper.classList.add("show");
    }, 100);

};

function spin() {

    document.getElementById("resultHint").style.opacity = 0;

    let warningMsg = document.getElementById("warningMsg");

    let ball = document.getElementById("ball");
    let miniBalls = document.querySelectorAll(".mini-ball");

    let resultBox = document.getElementById("result");
    let button = document.querySelector("button");
    let gachaImg = document.getElementById("gachaImg");
    let inside = document.querySelector(".balls-inside");

    let colors = ["red","yellow","green","blue","purple"];

        isSpinning = true;
    button.disabled = true;
    warningMsg.innerText = "⚠️ Please wait, the machine is spinning... ";

    // ⭐ reset ONLY state 
    ball.className = "ball";

    // start animations
    gachaImg.classList.add("shake");
    inside.classList.add("spin-inside");

    resultBox.innerText = "Spinning...";

    // ⭐ balls inside move up slightly
    miniBalls.forEach(b => {
        b.classList.remove("fall-down");
        b.classList.add("float-up");
    });

    setTimeout(() => {

        // balls drop back
        miniBalls.forEach(b => {
            b.classList.remove("float-up");
            b.classList.add("fall-down");
        });

        // ⭐ generate result ball
        let randomColor = colors[Math.floor(Math.random() * colors.length)];

        ball.classList.add(randomColor);
        ball.classList.add("drop");

        const category = "Dessert"; // ⭐ 每个页面改这里

        Promise.all([
            fetch('/random?category=' + category).then(res => res.json()),
            fetch('/random-multiple?category=' + category).then(res => res.json())
        ])
        .then(([mainData, listData]) => {

            setTimeout(() => {

                isSpinning = false;
                button.disabled = false;
                warningMsg.innerText = "";

                resultBox.innerText = "You got: " + mainData.name;

                let container = document.querySelector(".recipe-container");

                // ⭐ 主结果（中间）
                let mainCard = `
                    <div class="main-result">
                        <div class="recipe-card gacha-result pop">
                            <img src="${mainData.image}">
                            <h3 class="recipe-title">
                                <a href="/recipe/${mainData.id}">
                                    ${mainData.name}
                                </a>
                            </h3>
                        </div>
                    </div>
                `;

                // ⭐ 5个推荐
                let suggestionCards = listData.map(r => `
                    <div class="recipe-card small-card">
                        <img src="${r.image}">
                        <h3 class="recipe-title">
                            <a href="/recipe/${r.id}">
                                ${r.name}
                            </a>
                        </h3>
                    </div>
                `).join('');

                // ⭐ 最终结构
                container.innerHTML = `
                    ${mainCard}

                    <div class="suggestion-section">
                        <h3 class="suggestion-title">🍽️ You may also like</h3>
                        <div class="suggestion-grid">
                            ${suggestionCards}
                        </div>
                    </div>
                `;
                container.classList.add("result-mode");

                document.getElementById("resultHint").style.opacity = 1;

                gachaImg.classList.remove("shake");
                inside.classList.remove("spin-inside");

            }, 500);

        });

    }, 1000);
}
</script>

</body>
</html>
