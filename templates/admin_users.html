{% extends "base.html" %}

{% block title %}Admin Users{% endblock %}

{% block content %}

<div class="admin-users-wrapper">

    <h1 class="admin-title">Users Management</h1>

    <table class="users-table">

        <thead>
            <tr>
                <th>Email</th>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>
                    <span class="role-badge {{ user[2] }}">
                        {{ user[2] }}
                    </span>
                </td>
                <td>
                    <a href="/admin/delete/{{ user[0] }}" class="delete-btn"
                       onclick="return confirm('Are you sure?')">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
