{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<div class="profile-container">

    <!-- LEFT -->
    <div class="profile-left">

        <div class="profile-card">

            <div class="profile-img-box">
                <img src="{{ url_for('static', filename='uploads/' + profile_pic) if profile_pic else url_for('static', filename='uploads/default.png') }}">

                <form action="/upload-profile-pic" method="POST" enctype="multipart/form-data">
                    <input type="file" name="image" id="fileInput" accept="image/*" hidden>
                    <label for="fileInput" class="upload-btn">
                        Choose Photo
                    </label>

                    <button type="submit" class="upload-submit">
                        Upload
                    </button>

                </form>
            </div>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="profile-right">

        <div class="info-card">

            <form method="POST">
                <div class="input-box">
                    <label>Username</label>
                    <input name="username" id="username" type="text"
                        value="{{ username }}" disabled>
                </div>
                <div class="input-box">
                    <label>Email</label>
                    <input type="text" value="{{ email }}" disabled>
                </div>
                <div class="input-box">
                    <label>Bio</label>
                    <input name="bio" id="bio" type="text"
                        value="{{ bio }}" disabled>
                </div>
                <div class="profile-buttons">

                    <button type="button" class="edit-btn" onclick="enableEdit()">
                        Edit Profile
                    </button>

                    <button type="submit" class="edit-btn" id="saveBtn" style="display:none;">
                        Save
                    </button>
                    {% if role == 'admin' %}
                    <a href="/admin" class="admin-access-btn">
                        Admin Page
                    </a>
                    {% endif %}
                    <a href="/logout" class="logout-btn">
                        Logout
                    </a>
                </div>

            </form>


        </div>

    </div>

</div>
<section class="saved-rituals">

    <!-- Header -->
    <div class="rituals-header">
        <h2>Saved Rituals</h2>
        <a href="#" class="view-all">View all</a>
    </div>

    <!-- Grid -->
    <div class="rituals-grid">

        <div class="ritual-card">
            <img src="{{ url_for('static', filename='css/picture/f1.jpg') }}">
            <h3>Sweet Apples Squares</h3>
        </div>

        <div class="ritual-card">
            <img src="{{ url_for('static', filename='css/picture/f2.jpg') }}">
            <h3>Chicken Adobo</h3>
        </div>

        <div class="ritual-card">
            <img src="{{ url_for('static', filename='css/picture/f3.jpg') }}">
            <h3>Cinanamon Chicken Curry</h3>
        </div>

    </div>

</section>

{% endblock %}
