<div class="detail-page">

    <div class="detail-box">

        <!-- 左边图片 -->
        <div class="detail-left">
            <img src="{{ recipe['image'] }}" class="detail-img">
        </div>

        <!-- 右边内容 -->
        <div class="detail-content">

            <h1 class="detail-title">{{ recipe['name'] }}</h1>

            <div class="detail-section">
                <h3>⭐ Why You’ll Like This Recipe</h3>
                <p>
                    Quick, flavorful and beginner-friendly recipe that is perfect for any day.
                </p>
            </div>

            <div class="detail-section">
                <h3>🍳 Ingredients</h3>
                <p>{{ recipe['clean_ingredients'] }}</p>
            </div>

            <div class="detail-section">
                <h3>📖 Instructions</h3>
                <p style="white-space: pre-line;">
                    {{ recipe['directions'] }}
                </p>
            </div>

            <div class="detail-meta">
                <span>⏱ {{ recipe['timing'] }}</span>
                <span>🌶 {{ recipe['flavor_type'] }}</span>
            </div>

        </div>

    </div>

</div>
