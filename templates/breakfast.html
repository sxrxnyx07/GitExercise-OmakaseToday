<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gacha Recipe System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">
    <a href="/breakfast" class="active">Breakfast</a>
    <a href="/lunch">Lunch</a>
    <a href="/dinner">Dinner</a>
    <a href="/dessert">Dessert</a>
    <a href="/drinks">Drinks</a>
</div>

<div class="container">

<h1 class="category-title">🥯 Breakfast 🥞</h1>

<p class="subtitle">
    A great day begins with a great breakfast.  
    Let’s spin and discover a perfect meal to start your day right ✨
</p>

<div class="machine-wrapper">

    <img id="gachaImg" class="gacha-img fade-in"
         src="{{ url_for('static', filename='gacha1.png') }}">   <!-- GACHA IMAGE -->

    <div class="balls-inside" id="ballsInside"></div>

</div>

    <div id="ball" class="ball red"></div>

    <div class="machine-box">

        <div id="result">
            Click spin to get your recipe 🍽️
        </div>

        <button onclick="spin()">SPIN 🎲</button>

    </div>

</div>

<script>
    
let balls = document.querySelectorAll(".mini-ball");

window.onload = function () {

    const wrapper = document.getElementById("ballsInside");

    let colors = ["red","yellow","green","blue","purple"];

    let totalBalls = 20;

    for (let i = 0; i < totalBalls; i++) {

        let ball = document.createElement("div");
        ball.classList.add("mini-ball");

        // 🎨 random color
        let color = colors[Math.floor(Math.random() * colors.length)];
        ball.classList.add(color);

        // 📍 random location (limit in box)
        let x = (Math.random() - 0.5) * 260;
        let y = (Math.random() - 0.5) * 260;

        ball.style.transform = `translate(${x}px, ${y}px)`;

        wrapper.appendChild(ball);
    }
};

function spin() {

    let resultBox = document.getElementById("result");
    let button = document.querySelector("button");
    let gachaImg = document.getElementById("gachaImg");
    let inside = document.querySelector(".balls-inside");
    let ball = document.getElementById("ball");

    let colors = ["red","yellow","green","blue","purple"];

    button.disabled = true;

    // start shake and spin inside
    gachaImg.classList.add("shake");
    inside.classList.add("spin-inside");

    resultBox.innerText = "Spinning...";

    setTimeout(() => {

        // ball come out via ramdom color
        let randomColor = colors[Math.floor(Math.random() * colors.length)];
        ball.className = "ball " + randomColor;

        // ball come out
        ball.classList.add("drop");

        fetch('/random')
        .then(res => res.json())
        .then(data => {

            setTimeout(() => {

                // show result
                resultBox.innerText = "You got: " + data.recipe;

                // stop animation
                gachaImg.classList.remove("shake");
                inside.classList.remove("spin-inside");

                ball.classList.remove("drop");

                button.disabled = false;

            }, 500);

        });

    }, 1000);
}
</script>

</body>
</html>
